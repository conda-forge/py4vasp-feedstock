{% set name = "py4vasp" %}
{% set version = "0.10.4" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/py4vasp-{{ version }}.tar.gz
  sha256: d1a7d05a2431b341293faf8d5b4ca860caf4e73cb6722044724d9677c5ac0b61
  patches:
    - nglview.patch

build:
  entry_points:
    - error-analysis = py4vasp.scripts.error_analysis:main
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - poetry-core
    - pip
  run:
    - scipy >=1.12.0
    - python >={{ python_min }}
    - numpy >=1.23
    - h5py >=3.7.0
    - pandas >=1.4.3
    - nglview >=3.0.5
    - ase >=3.22.1,!=3.25.0
    - plotly >=5.9.0
    - python-kaleido >0.2.1.post1
    - ipython >=8.12
    - notebook

test:
  imports:
    - py4vasp
  commands:
    - pip check
    - error-analysis --help
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://vasp.at/py4vasp/latest
  summary: Tool for assisting with the analysis and setup of VASP calculations.
  license: Apache-2.0
  license_file: LICENSE.txt

extra:
  recipe-maintainers:
    - martin-schlipf
    - jan-janssen
