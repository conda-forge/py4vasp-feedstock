{% set name = "py4vasp" %}
{% set version = "0.11.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/py4vasp-{{ version }}.tar.gz
  sha256: 453ec34c7f3ffaaf0c36119b8fddaa2215edd2e3a90485d588c3374efc1d8bb0

build:
  entry_points:
    - error-analysis = py4vasp.scripts.error_analysis:main
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - hatchling
    - pip
  run:
    - click >=8.1.8
    - scipy >=1.12.0
    - python >={{ python_min }}
    - numpy >=2.0
    - h5py >=3.9.0
    - pandas >=2.0
    - nglview >=3.0.5
    - ase >=3.23
    - plotly >=5.23
    - python-kaleido >=1.0
    - ipython >=8.26
    - notebook

test:
  imports:
    - py4vasp
  commands:
    - pip check
    - error-analysis --help
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://vasp.at/py4vasp/latest
  summary: Tool for assisting with the analysis and setup of VASP calculations.
  license: Apache-2.0
  license_file: LICENSE.txt

extra:
  recipe-maintainers:
    - martin-schlipf
    - jan-janssen
